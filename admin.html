<!DOCTYPE html>
<html lang="ms" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#f8fafc">
  <link rel="manifest" href="/manifest.json">
  <title>JAYACUCI — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f8fafc;--surface:#fff;--card:#fff;--border:#e2e8f0;--border-strong:#cbd5e1;
      --text:#0f172a;--text2:#475569;--text3:#94a3b8;
      --green:#16a34a;--green-bg:#dcfce7;--green-text:#15803d;
      --blue:#2563eb;--blue-bg:#dbeafe;--blue-text:#1d4ed8;
      --red:#dc2626;--red-bg:#fee2e2;--red-text:#b91c1c;
      --amber-bg:#fef3c7;--amber-text:#a16207;
      --nav-bg:rgba(255,255,255,.85);--shadow:0 1px 2px rgba(0,0,0,.04);--shadow-lg:0 4px 24px rgba(0,0,0,.06);
      --radius:14px;--radius-sm:8px;--radius-xs:6px
    }
    .dark{
      --bg:#0b1120;--surface:#111827;--card:#1a2332;--border:#1e2d45;--border-strong:#2d3a52;
      --text:#f1f5f9;--text2:#94a3b8;--text3:#475569;
      --green:#22c55e;--green-bg:rgba(34,197,94,.12);--green-text:#4ade80;
      --blue:#3b82f6;--blue-bg:rgba(59,130,246,.12);--blue-text:#60a5fa;
      --red:#ef4444;--red-bg:rgba(239,68,68,.12);--red-text:#f87171;
      --amber-bg:rgba(251,191,36,.12);--amber-text:#fbbf24;
      --nav-bg:rgba(17,24,39,.85);--shadow:0 1px 2px rgba(0,0,0,.2);--shadow-lg:0 4px 24px rgba(0,0,0,.3)
    }
    @media(prefers-color-scheme:dark){html:not(.light):not(.dark){--bg:#0b1120;--surface:#111827;--card:#1a2332;--border:#1e2d45;--border-strong:#2d3a52;--text:#f1f5f9;--text2:#94a3b8;--text3:#475569;--green:#22c55e;--green-bg:rgba(34,197,94,.12);--green-text:#4ade80;--blue:#3b82f6;--blue-bg:rgba(59,130,246,.12);--blue-text:#60a5fa;--red:#ef4444;--red-bg:rgba(239,68,68,.12);--red-text:#f87171;--amber-bg:rgba(251,191,36,.12);--amber-text:#fbbf24;--nav-bg:rgba(17,24,39,.85);--shadow:0 1px 2px rgba(0,0,0,.2);--shadow-lg:0 4px 24px rgba(0,0,0,.3)}}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;padding-bottom:90px;-webkit-tap-highlight-color:transparent;transition:background .3s,color .3s;-webkit-font-smoothing:antialiased}
    @media(min-width:768px){body{max-width:480px;margin:0 auto;border-left:1px solid var(--border);border-right:1px solid var(--border)}}

    /* HEADER */
    .header{position:sticky;top:0;z-index:50;background:var(--nav-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:16px 18px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px}
    .header-brand{display:flex;align-items:center;gap:10px}
    .header-logo{width:36px;height:36px;border-radius:10px;background:var(--green);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:.9rem;box-shadow:0 2px 8px rgba(22,163,74,.25)}
    .header-info h1{font-size:.95rem;font-weight:700;line-height:1.2;letter-spacing:-.2px}
    .header-info span{font-size:.65rem;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.8px}
    .header-actions{display:flex;gap:6px}
    .header-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;transition:all .15s}
    .header-btn:active{transform:scale(.94);background:var(--border)}

    /* STAT ROW */
    .stats{padding:16px 18px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 14px;text-align:center;box-shadow:var(--shadow);transition:all .2s}
    .stat-card .num{font-size:1.8rem;font-weight:800;line-height:1;letter-spacing:-1px}
    .stat-card .lbl{font-size:.65rem;color:var(--text3);margin-top:6px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
    .stat-card.today .num{color:var(--blue)}.stat-card.total .num{color:var(--green)}.stat-card.pending .num{color:var(--amber-text)}

    /* SECTION TITLE */
    .sec-title{padding:0 18px 10px;font-size:.7rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px}

    /* BOOKING LIST */
    .list{padding:0 14px;display:flex;flex-direction:column;gap:8px}
    .b-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);transition:all .15s;display:flex;gap:14px;align-items:flex-start;animation:fadeIn .3s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .b-card:active{transform:scale(.985);background:var(--border)}
    .bc-content{flex:1;min-width:0}
    .bc-meta{display:flex;align-items:center;gap:6px;margin-bottom:4px}
    .bc-date{font-size:.72rem;font-weight:600;color:var(--text2)}
    .bc-dot{width:3px;height:3px;border-radius:50%;background:var(--text3)}
    .bc-name{font-size:.92rem;font-weight:700;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .bc-addr{font-size:.72rem;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
    .bc-phone{font-size:.72rem;color:var(--green);font-weight:500}
    .bc-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
    .bc-badge.pending{background:var(--amber-bg);color:var(--amber-text)}
    .bc-badge.confirmed{background:var(--green-bg);color:var(--green-text)}
    .bc-badge.completed{background:var(--blue-bg);color:var(--blue-text)}
    .bc-badge.cancelled{background:var(--red-bg);color:var(--red-text)}
    .bc-actions{display:flex;gap:6px;margin-top:8px}
    .bc-act{flex:1;border:none;padding:7px 0;border-radius:var(--radius-xs);font-size:.68rem;font-weight:600;cursor:pointer;transition:all .12s;text-align:center;background:transparent;border:1px solid var(--border);color:var(--text2)}
    .bc-act:active{transform:scale(.96)}
    .bc-act.accept{border-color:var(--green)}.bc-act.accept:active,.bc-act.accept:hover{background:var(--green);color:#fff}
    .bc-act.done{border-color:var(--blue)}.bc-act.done:active,.bc-act.done:hover{background:var(--blue);color:#fff}
    .bc-act.decline{border-color:var(--red)}.bc-act.decline:active,.bc-act.decline:hover{background:var(--red);color:#fff}

    /* BOTTOM NAV */
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--nav-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:6px 0 14px;z-index:50}
    @supports(padding-bottom:env(safe-area-inset-bottom)){.bottom-nav{padding-bottom:calc(6px + env(safe-area-inset-bottom))}}
    .nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--text3);cursor:pointer;padding:6px 12px;font-family:inherit;transition:color .15s}
    .nav-item.active{color:var(--green)}.nav-item .ni{font-size:1.2rem}.nav-item .nl{font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px}

    /* MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:flex-end;justify-content:center;padding:12px;backdrop-filter:blur(4px)}
    .modal-overlay.show{display:flex}.modal-overlay.show .modal-sheet{animation:slideUp .25s ease}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .modal-sheet{background:var(--surface);border-radius:24px 24px 0 0;padding:20px 20px 28px;width:100%;max-width:480px;max-height:85dvh;overflow-y:auto;box-shadow:var(--shadow-lg);border:1px solid var(--border)}
    .modal-sheet h3{font-size:1rem;font-weight:700;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .modal-sheet h3 .ms-dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
    .modal-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:.8rem}
    .modal-row .k{color:var(--text3)}.modal-row .v{color:var(--text);font-weight:600;text-align:right;max-width:65%;word-break:break-word}
    .modal-actions{display:flex;gap:8px;margin-top:18px}
    .modal-btn{flex:1;padding:10px;border:none;border-radius:var(--radius-xs);font-weight:600;font-size:.75rem;cursor:pointer;transition:all .12s;background:var(--bg);color:var(--text);border:1px solid var(--border)}
    .modal-btn.accept{background:var(--green);color:#fff;border:1px solid var(--green)}.modal-btn.accept:active{opacity:.8}
    .modal-btn.done{background:var(--blue);color:#fff;border:1px solid var(--blue)}.modal-btn.done:active{opacity:.8}
    .modal-btn.cancel{background:var(--red);color:#fff;border:1px solid var(--red)}.modal-btn.cancel:active{opacity:.8}
    .modal-btn:active{transform:scale(.97)}

    /* EMPTY */
    .empty{text-align:center;padding:60px 20px}.empty .eicon{font-size:2.5rem;margin-bottom:10px;opacity:.6}.empty p{color:var(--text3);font-size:.82rem}

    /* LOADER */
    .spinner{display:flex;align-items:center;justify-content:center;padding:40px;gap:6px}
    .spinner-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:dotPulse 1.4s infinite}.spinner-dot:nth-child(2){animation-delay:.2s}.spinner-dot:nth-child(3){animation-delay:.4s}
    @keyframes dotPulse{0%,80%,100%{opacity:.3}40%{opacity:1}}

    /* LOGIN */
    .login-overlay{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;align-items:center;justify-content:center;transition:background .3s}
    .login-overlay.hidden{display:none}
    .login-box{width:320px;max-width:90vw;text-align:center}
    .login-avatar{width:64px;height:64px;border-radius:18px;background:var(--green-bg);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:1.8rem}
    .login-box h2{font-size:1.2rem;font-weight:700;color:var(--text);margin-bottom:6px}
    .login-box p{font-size:.78rem;color:var(--text3);margin-bottom:20px}
    .login-box input{width:100%;padding:14px 16px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:inherit;font-size:.9rem;margin-bottom:10px;outline:none;text-align:center;transition:border .2s}.login-box input:focus{border-color:var(--green)}
    .login-box .err{color:var(--red);font-size:.7rem;margin-bottom:4px;display:none}
    .login-box button{width:100%;padding:12px;background:var(--green);color:#fff;border:none;border-radius:var(--radius);font-weight:700;font-size:.88rem;cursor:pointer;transition:opacity .15s}.login-box button:active{opacity:.85}
  </style>
</head>
<body>

<header class="header">
  <div class="header-brand">
    <div class="header-logo">JC</div>
    <div class="header-info"><h1>JAYACUCI</h1><span>Admin Panel</span></div>
  </div>
  <div class="header-actions">
    <button class="header-btn" onclick="toggleTheme()" id="themeBtn" title="Toggle theme">🌓</button>
    <button class="header-btn" onclick="logout()" style="color:var(--red)" title="Logout">⏻</button>
  </div>
</header>

<div class="stats">
  <div class="stat-card today"><div class="num" id="statToday">0</div><div class="lbl">Hari Ini</div></div>
  <div class="stat-card total"><div class="num" id="statTotal">0</div><div class="lbl">Total</div></div>
  <div class="stat-card pending"><div class="num" id="statPending">0</div><div class="lbl">Pending</div></div>
</div>

<div class="sec-title">📋 Tempahan</div>
<div class="list" id="list"><div class="spinner"><div class="spinner-dot"></div><div class="spinner-dot"></div><div class="spinner-dot"></div></div></div>

<nav class="bottom-nav">
  <button class="nav-item active" id="navAll" onclick="loadBookings()"><span class="ni">📋</span><span class="nl">Semua</span></button>
  <button class="nav-item" id="navWait" onclick="loadBookings('pending_payment')"><span class="ni">⏳</span><span class="nl">Pending</span></button>
  <button class="nav-item" id="navOK" onclick="loadBookings('confirmed')"><span class="ni">✅</span><span class="nl">Confirm</span></button>
  <button class="nav-item" onclick="loadBookings(currentFilter)"><span class="ni">🔄</span><span class="nl">Refresh</span></button>
</nav>

<div class="modal-overlay" id="modal"><div class="modal-sheet"><h3 id="modalTitle"></h3><div id="modalBody"></div><div class="modal-actions" id="modalActions"></div></div></div>

<div class="login-overlay" id="loginOverlay"><div class="login-box">
  <div class="login-avatar">JC</div>
  <h2>Admin Access</h2>
  <p>Masukkan password</p>
  <input type="password" id="loginPass" placeholder="Password..." autocomplete="off">
  <p class="err" id="loginErr">Password salah</p>
  <button onclick="doLogin()">Unlock</button>
</div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// === CONFIG ===
var SB = supabase.createClient('https://thbscwlcyhcnqsppoyfn.supabase.co','sb_publishable_jFrl83f8l_tcWTulTL5lkQ_bLnCVpYR');
var ADMIN_PW='6e5574b72c57535f',AUTH_KEY='jbauth',currentFilter=null,allBookings=[],currentId=null;

// === THEME ===
var theme=localStorage.getItem('theme')||'system';applyTheme(theme);
function applyTheme(t){
  var html=document.documentElement;
  if(t==='dark'){html.classList.add('dark');html.classList.remove('light')}
  else if(t==='light'){html.classList.add('light');html.classList.remove('dark')}
  else{html.classList.remove('light','dark')}
  var isDark=html.classList.contains('dark')||(!html.classList.contains('light')&&window.matchMedia('(prefers-color-scheme:dark)').matches);
  document.querySelector('meta[name="theme-color"]').content=isDark?'#0b1120':'#f8fafc';
}
function toggleTheme(){
  var html=document.documentElement;
  if(html.classList.contains('light'))theme='dark';
  else if(html.classList.contains('dark'))theme='system';
  else theme='light';
  localStorage.setItem('theme',theme);applyTheme(theme);
}

// === DATA ===
function fmtDate(d){if(!d)return'-';var p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0]}
function fmtTime(t){return t==='9am'?'9:00 AM':(t==='11am'?'11:00 AM':(t==='2pm'?'2:00 PM':'4:00 PM'))}
function badge(s){
  if(s==='confirmed')return'<span class="bc-badge confirmed">Diterima</span>';
  if(s==='completed')return'<span class="bc-badge completed">Selesai</span>';
  if(s==='cancelled')return'<span class="bc-badge cancelled">Batal</span>';
  return'<span class="bc-badge pending">Pending</span>';
}

async function loadBookings(filter){
  currentFilter=filter||null;
  document.querySelectorAll('.nav-item').forEach(function(n){n.classList.remove('active')});
  if(!filter)document.getElementById('navAll').classList.add('active');
  else if(filter==='pending_payment')document.getElementById('navWait').classList.add('active');
  else if(filter==='confirmed')document.getElementById('navOK').classList.add('active');
  var list=document.getElementById('list');list.innerHTML='<div class="spinner"><div class="spinner-dot"></div><div class="spinner-dot"></div><div class="spinner-dot"></div></div>';
  try{
    var {data,error}=await SB.from('bookings').select('*').order('booking_date',{ascending:true}).order('booking_time',{ascending:true});
    if(error)throw error;allBookings=data||[];
    var filtered=filter?allBookings.filter(function(b){return b.status===filter}):allBookings;
    updateStats(allBookings);
    if(!filtered.length){list.innerHTML='<div class="empty"><div class="eicon">📭</div><p>Tiada tempahan</p></div>';return}
    var h='';filtered.forEach(function(b){
      h+='<div class="b-card" onclick="showModal(\''+b.id+'\')"><div class="bc-content">';
      h+='<div class="bc-meta"><span class="bc-date">'+fmtDate(b.booking_date)+'</span><span class="bc-dot"></span><span class="bc-date">'+fmtTime(b.booking_time)+'</span></div>';
      h+='<div class="bc-name">'+b.customer_name.replace(/</g,'&lt;')+'</div>';
      h+='<div class="bc-addr">📍 '+b.customer_address.replace(/</g,'&lt;')+'</div>';
      h+='<div class="bc-phone">📱 '+b.customer_phone.replace(/</g,'&lt;')+'</div>';
      h+='<div class="bc-actions" onclick="event.stopPropagation()">';
      if(b.status==='pending_payment')h+='<button class="bc-act accept" onclick="quickUpdate(\''+b.id+'\',\'confirmed\')">✅ Terima</button>';
      if(b.status==='confirmed'||b.status==='pending_payment')h+='<button class="bc-act done" onclick="quickUpdate(\''+b.id+'\',\'completed\')">✔ Selesai</button>';
      h+='<button class="bc-act decline" onclick="quickUpdate(\''+b.id+'\',\'cancelled\')">✕ Batal</button></div>';
      h+='</div><div>'+badge(b.status)+'</div></div>';
    });
    list.innerHTML=h;
  }catch(e){list.innerHTML='<div class="empty"><div class="eicon">⚠️</div><p>'+e.message+'</p></div>'}
}

function updateStats(data){
  var today=new Date().toISOString().split('T')[0];
  document.getElementById('statToday').textContent=data.filter(function(b){return b.booking_date===today}).length;
  document.getElementById('statTotal').textContent=data.length;
  document.getElementById('statPending').textContent=data.filter(function(b){return b.status==='pending_payment'}).length;
}

function showModal(id){
  currentId=id;var b=allBookings.find(function(x){return x.id===id});if(!b)return;
  document.getElementById('modalTitle').innerHTML='<span class="ms-dot"></span>'+b.customer_name;
  var ph=b.customer_phone.replace(/[^0-9]/g,'');if(ph.startsWith('0'))ph='6'+ph.substring(1);
  document.getElementById('modalBody').innerHTML=
    '<div class="modal-row"><span class="k">Tarikh</span><span class="v">'+fmtDate(b.booking_date)+' · '+fmtTime(b.booking_time)+'</span></div>'+
    '<div class="modal-row"><span class="k">Telefon</span><span class="v"><a href="https://wa.me/'+ph+'" target="_blank" style="color:var(--green);font-weight:600;text-decoration:none">💬 WhatsApp</a></span></div>'+
    '<div class="modal-row"><span class="k">Alamat</span><span class="v">'+b.customer_address+'</span></div>'+
    '<div class="modal-row"><span class="k">Jumlah</span><span class="v">RM'+b.amount+'</span></div>'+
    '<div class="modal-row"><span class="k">Deposit</span><span class="v">RM'+b.deposit_amount+'</span></div>'+
    '<div class="modal-row"><span class="k">Status Bayar</span><span class="v">'+b.payment_status+'</span></div>'+
    '<div class="modal-row"><span class="k">Status</span><span class="v">'+b.status+'</span></div>';
  var acts='';
  if(b.status==='pending_payment')acts+='<button class="modal-btn accept" onclick="updateStatus(\''+id+'\',\'confirmed\')">✅ Terima</button>';
  if(b.status==='confirmed'||b.status==='pending_payment')acts+='<button class="modal-btn done" onclick="updateStatus(\''+id+'\',\'completed\')">✔ Selesai</button>';
  acts+='<button class="modal-btn cancel" onclick="updateStatus(\''+id+'\',\'cancelled\')">✕ Batal</button>';
  acts+='<button class="modal-btn" onclick="closeModal()">Tutup</button>';
  document.getElementById('modalActions').innerHTML=acts;document.getElementById('modal').classList.add('show');
}
function closeModal(){document.getElementById('modal').classList.remove('show');currentId=null}
async function updateStatus(id,s){try{await SB.from('bookings').update({status:s,updated_at:new Date().toISOString()}).eq('id',id);closeModal();loadBookings(currentFilter)}catch(e){alert(e.message)}}
async function quickUpdate(id,s){try{await SB.from('bookings').update({status:s,updated_at:new Date().toISOString()}).eq('id',id);loadBookings(currentFilter)}catch(e){alert(e.message)}}

// === AUTH ===
function doLogin(){
  var pw=document.getElementById('loginPass').value;if(!pw)return;
  var t='JBS'+pw+'cuci',h='';for(var i=0;i<t.length;i++)h+=((t.charCodeAt(i)*7)%16).toString(16);
  if(h===ADMIN_PW){sessionStorage.setItem(AUTH_KEY,'1');document.getElementById('loginOverlay').classList.add('hidden');loadBookings()}else{document.getElementById('loginErr').style.display='block'}
}
function logout(){sessionStorage.removeItem(AUTH_KEY);location.reload()}
if(sessionStorage.getItem(AUTH_KEY)==='1'){document.getElementById('loginOverlay').classList.add('hidden');loadBookings()}
document.getElementById('loginPass').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin()});

// === PULL TO REFRESH ===
var ts=0;document.addEventListener('touchstart',function(e){ts=e.touches[0].clientY});document.addEventListener('touchend',function(e){if(window.scrollY===0&&e.changedTouches[0].clientY-ts>80)loadBookings(currentFilter)});
</script>
</body>
</html>
