<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — Jaya Bina Services</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Poppins',sans-serif;background:#111;color:#e0e0e0;min-height:100vh}
    .header{background:#1a1a1a;border-bottom:2px solid #2E7D32;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
    .header h1{font-size:1.2rem;color:#4CAF50}
    .header .stats{display:flex;gap:20px;font-size:.82rem}
    .header .stats span{color:#888}.header .stats strong{color:#fff;font-size:1rem}
    .container{max-width:1200px;margin:0 auto;padding:24px}
    .refresh-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
    .refresh-bar .info{font-size:.78rem;color:#888}
    .btn{background:#2E7D32;color:#fff;border:none;padding:8px 20px;border-radius:8px;cursor:pointer;font-weight:600;font-size:.85rem;transition:all .15s}
    .btn:hover{background:#388E3C}
    .btn-sm{padding:6px 14px;font-size:.75rem}
    .btn-danger{background:#c62828}.btn-danger:hover{background:#e53935}
    table{width:100%;border-collapse:collapse;background:#1a1a1a;border-radius:12px;overflow:hidden;font-size:.85rem}
    th{background:#222;color:#4CAF50;padding:14px 16px;text-align:left;font-weight:700;font-size:.78rem;text-transform:uppercase;letter-spacing:.5px}
    td{padding:12px 16px;border-bottom:1px solid #2a2a2a}
    tr:hover{background:#1e1e1e}
    .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:700}
    .badge-confirmed{background:#1B5E20;color:#A5D6A7}
    .badge-pending{background:#5D4037;color:#FFCC80}
    .badge-completed{background:#01579B;color:#B3E5FC}
    .badge-cancelled{background:#B71C1C;color:#EF9A9A}
    .empty{text-align:center;padding:60px 20px;color:#666}
    .empty .eicon{font-size:3rem;margin-bottom:12px}
    .loading-row td{text-align:center;padding:40px;color:#888}
    .loading-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#4CAF50;margin:0 3px;animation:pulse 1.4s infinite}
    .loading-dot:nth-child(2){animation-delay:.2s}.loading-dot:nth-child(3){animation-delay:.4s}
    @keyframes pulse{0%,80%,100%{opacity:.3}40%{opacity:1}}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:100}
    .modal.show{display:flex}
    .modal-card{background:#1a1a1a;border-radius:16px;padding:28px;max-width:500px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,.5)}
    .modal-card h3{color:#4CAF50;margin-bottom:16px}
    .modal-card p{font-size:.88rem;color:#bbb;margin-bottom:8px;line-height:1.6}
    .modal-card strong{color:#e0e0e0}
    .modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}

    /* LOGIN GATE */
    .login-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;display:flex;align-items:center;justify-content:center}
    .login-overlay.hidden{display:none}
    .login-box{background:#1a1a1a;border:1px solid #333;border-radius:16px;padding:40px 36px;width:380px;max-width:90vw;text-align:center}
    .login-box h2{color:#4CAF50;margin-bottom:8px;font-size:1.4rem}
    .login-box .sub{color:#888;font-size:.82rem;margin-bottom:24px}
    .login-box input{width:100%;padding:12px 16px;background:#252525;border:1px solid #444;border-radius:10px;color:#e0e0e0;font-family:inherit;font-size:.95rem;margin-bottom:12px;outline:none;transition:border-color .2s}
    .login-box input:focus{border-color:#4CAF50}
    .login-box .err{color:#e53935;font-size:.78rem;margin-bottom:8px;display:none}
    .login-box .btn-login{width:100%;padding:12px;background:#2E7D32;color:#fff;border:none;border-radius:10px;font-weight:700;font-size:.95rem;cursor:pointer;transition:background .15s}
    .login-box .btn-login:hover{background:#388E3C}
    .btn-logout{background:transparent;color:#e53935;border:1px solid #e53935;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:.72rem;transition:all .15s}
    .btn-logout:hover{background:#e53935;color:#fff}
  </style>
</head>
<body>

<div class="header">
  <h1>Jaya Bina — Admin Panel</h1>
  <div style="display:flex;align-items:center;gap:16px">
    <div class="stats">
      <span>Hari ini: <strong id="statToday">-</strong></span>
      <span>Total: <strong id="statTotal">-</strong></span>
      <span>Pending: <strong id="statPending">-</strong></span>
    </div>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</div>

<!-- LOGIN GATE -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>&#128274; Admin Login</h2>
    <p class="sub">Masukkan password untuk akses panel</p>
    <input type="password" id="loginPass" placeholder="Password..." autocomplete="current-password">
    <p class="err" id="loginErr">Password salah</p>
    <button class="btn-login" onclick="doLogin()">Login</button>
  </div>
</div>

<div class="container">
  <div class="refresh-bar">
    <span class="info" id="refreshInfo">Loading...</span>
    <div style="display:flex;gap:10px">
      <button class="btn btn-sm" onclick="loadBookings()">&#8635; Refresh</button>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Tarikh</th>
        <th>Masa</th>
        <th>Nama</th>
        <th>Telefon</th>
        <th>Alamat</th>
        <th>Status</th>
        <th>Tindakan</th>
      </tr>
    </thead>
    <tbody id="bookingTable">
      <tr class="loading-row"><td colspan="7"><span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span></td></tr>
    </tbody>
  </table>
</div>

<div class="modal" id="detailModal">
  <div class="modal-card">
    <h3>Detail Booking</h3>
    <div id="modalContent"></div>
    <div class="modal-actions">
      <button class="btn btn-sm" onclick="updateStatus('confirmed')">&#10003; Confirm</button>
      <button class="btn btn-sm" onclick="updateStatus('completed')">&#10004; Selesai</button>
      <button class="btn btn-sm btn-danger" onclick="updateStatus('cancelled')">&#10007; Batal</button>
      <button class="btn btn-sm" style="background:#555" onclick="document.getElementById('detailModal').classList.remove('show')">Tutup</button>
    </div>
  </div>
</div>

<script>
var SB_URL='https://thbscwlcyhcnqsppoyfn.supabase.co';
var SB_KEY='sb_publishable_jFrl83f8l_tcWTulTL5lkQ_bLnCVpYR';
var currentBookingId=null;

async function sbFetch(table,query){
  var url=SB_URL+'/rest/v1/'+table+query;
  var r=await fetch(url,{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}

async function sbPatch(table,id,body){
  var url=SB_URL+'/rest/v1/'+table+'?id=eq.'+id;
  var r=await fetch(url,{method:'PATCH',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'},body:JSON.stringify(body)});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}

function fmtDate(d){if(!d)return '-';var p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0]}
function fmtTime(t){return t==='9am'?'9:00 AM':(t==='11am'?'11:00 AM':(t==='2pm'?'2:00 PM':'4:00 PM'))}
function statusBadge(s){
  if(s==='confirmed')return '<span class="badge badge-confirmed">Disahkan</span>';
  if(s==='completed')return '<span class="badge badge-completed">Selesai</span>';
  if(s==='cancelled')return '<span class="badge badge-cancelled">Dibatalkan</span>';
  return '<span class="badge badge-pending">Pending</span>';
}

async function loadBookings(){
  var tbody=document.getElementById('bookingTable');
  tbody.innerHTML='<tr class="loading-row"><td colspan="7"><span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span></td></tr>';
  try{
    var data=await sbFetch('bookings','?select=*&order=booking_date.asc,booking_time.asc');
    if(!data.length){tbody.innerHTML='<tr><td colspan="7"><div class="empty"><div class="eicon">&#128203;</div><p>Tiada booking lagi.</p></div></td></tr>';updateStats(data);return}
    var html='';
    data.forEach(function(b){
      html+='<tr>';
      html+='<td>'+fmtDate(b.booking_date)+'</td>';
      html+='<td>'+fmtTime(b.booking_time)+'</td>';
      html+='<td><strong>'+b.customer_name.replace(/</g,'&lt;')+'</strong></td>';
      html+='<td><a href="https://wa.me/6'+b.customer_phone.replace(/[^0-9]/g,'').slice(1)+'" target="_blank" style="color:#4CAF50">'+b.customer_phone.replace(/</g,'&lt;')+'</a></td>';
      html+='<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+b.customer_address.replace(/</g,'&lt;')+'">'+b.customer_address.replace(/</g,'&lt;')+'</td>';
      html+='<td>'+statusBadge(b.status)+'</td>';
      html+='<td><button class="btn btn-sm" onclick="showDetail(\''+b.id+'\')">&#128065; Lihat</button></td>';
      html+='</tr>';
    });
    tbody.innerHTML=html;
    updateStats(data);
    document.getElementById('refreshInfo').textContent='Last update: '+new Date().toLocaleTimeString('ms-MY');
  }catch(e){
    tbody.innerHTML='<tr><td colspan="7"><div class="empty"><div class="eicon">&#9888;</div><p>Gagal load: '+e.message+'</p></div></td></tr>';
  }
}

function updateStats(data){
  var today=new Date().toISOString().split('T')[0];
  var todayCount=data.filter(function(b){return b.booking_date===today}).length;
  document.getElementById('statToday').textContent=todayCount;
  document.getElementById('statTotal').textContent=data.length;
  document.getElementById('statPending').textContent=data.filter(function(b){return b.status==='pending_payment'}).length;
}

async function showDetail(id){
  currentBookingId=id;
  try{
    var data=await sbFetch('bookings','?select=*&id=eq.'+id);
    var b=data[0];
    document.getElementById('modalContent').innerHTML='\
      <p><strong>Nama:</strong> '+b.customer_name+'</p>\
      <p><strong>Telefon:</strong> <a href="https://wa.me/6'+b.customer_phone.replace(/[^0-9]/g,'').slice(1)+'" target="_blank" style="color:#4CAF50">'+b.customer_phone+'</a></p>\
      <p><strong>Alamat:</strong> '+b.customer_address+'</p>\
      <p><strong>Tarikh:</strong> '+fmtDate(b.booking_date)+' | <strong>Masa:</strong> '+fmtTime(b.booking_time)+'</p>\
      <p><strong>Deposit:</strong> RM'+b.deposit_amount+' | <strong>Jumlah:</strong> RM'+b.amount+'</p>\
      <p><strong>Status Bayaran:</strong> '+b.payment_status+'</p>\
      <p><strong>Status Booking:</strong> '+b.status+'</p>\
      <p><strong>Ref:</strong> <code>'+b.id+'</code></p>';
    document.getElementById('detailModal').classList.add('show');
  }catch(e){alert('Error: '+e.message)}
}

async function updateStatus(status){
  if(!currentBookingId)return;
  try{
    await sbPatch('bookings',currentBookingId,{status:status,updated_at:new Date().toISOString()});
    document.getElementById('detailModal').classList.remove('show');
    loadBookings();
  }catch(e){alert('Error: '+e.message)}
}

loadBookings();
setInterval(loadBookings,30000);

// === AUTH LOGIC ===
var ADMIN_PW = '88f1cf5a9b4e3c7d2a6e8f0b1c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c'; // SHA256 hash — tukar password guna hash
var AUTH_KEY = 'jaya_admin_v1';

function hash(str){var h=0,i,c;for(i=0;i<str.length;i++){c=str.charCodeAt(i);h=((h<<5)-h)+c;h|=0}return Math.abs(h).toString(36)}

function doLogin(){
  var pw=document.getElementById('loginPass').value;
  if(!pw)return;
  // For first use: accept 'admin123' to set your own password
  // SHA256 not available in vanilla JS, guna salted hash instead
  var salted = 'JBS'+pw+'cuci';
  var h='';for(var i=0;i<salted.length;i++)h+=((salted.charCodeAt(i)*7)%16).toString(16);
  if(h===ADMIN_PW || pw==='admin123'){ // 'admin123' untuk first-time login
    if(pw==='admin123'){document.getElementById('loginErr').textContent='Tukar password! Guna console: setPassword("newpass")';document.getElementById('loginErr').style.color='#FFC107';document.getElementById('loginErr').style.display='block'}
    sessionStorage.setItem(AUTH_KEY,'1');
    document.getElementById('loginOverlay').classList.add('hidden');
    document.getElementById('loginPass').value='';
  }else{
    document.getElementById('loginErr').style.display='block';
    document.getElementById('loginErr').style.color='#e53935';
    document.getElementById('loginErr').textContent='Password salah';
  }
}
function setPassword(newPw){
  var salted='JBS'+newPw+'cuci';
  var h='';for(var i=0;i<salted.length;i++)h+=((salted.charCodeAt(i)*7)%16).toString(16);
  ADMIN_PW=h;sessionStorage.setItem('admin_pw_hash',h);
  alert('Password updated! Copy hash ni ke admin.html: '+h);
}
function logout(){sessionStorage.removeItem(AUTH_KEY);location.reload()}
if(sessionStorage.getItem(AUTH_KEY)==='1'){document.getElementById('loginOverlay').classList.add('hidden')}
if(sessionStorage.getItem('admin_pw_hash')){ADMIN_PW=sessionStorage.getItem('admin_pw_hash')}

// Enter key on password field
document.getElementById('loginPass').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin()});
</script>
</body>
</html>
