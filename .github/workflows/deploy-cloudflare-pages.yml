name: Deploy JAYABINA to Cloudflare Pages

on:
  push:
    branches: [master]
  workflow_dispatch: {}

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CF_PAGES_TOKEN_READY: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CF_ACCOUNT_READY: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6

      - name: Install Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: latest
          extended: true

      - name: Build customer site
        run: bash build.sh

      - name: Build admin portal
        run: bash build-admin.sh

      - name: Build JAYABINA Hugo website
        run: hugo --source site --destination "$GITHUB_WORKSPACE/site-public" --gc --minify

      - name: Install Wrangler
        if: ${{ env.CF_PAGES_TOKEN_READY != '' && env.CF_ACCOUNT_READY != '' }}
        run: npm install -g wrangler

      - name: Deploy customer site
        if: ${{ env.CF_PAGES_TOKEN_READY != '' && env.CF_ACCOUNT_READY != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler pages deploy public --project-name jayaclean --branch master

      - name: Deploy admin portal
        if: ${{ env.CF_PAGES_TOKEN_READY != '' && env.CF_ACCOUNT_READY != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler pages deploy admin-public --project-name jayabina-admin --branch master

      - name: Deploy JAYABINA Hugo website
        if: ${{ env.CF_PAGES_TOKEN_READY != '' && env.CF_ACCOUNT_READY != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler pages deploy site-public --project-name jayabina --branch master
